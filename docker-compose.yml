version: "3.9"

services:
  backend:
    image: varshineeduddi/docmind-backend:v9
    container_name: docmind-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://172.17.0.1:11434/api/generate
    restart: always

  frontend:
    image: varshineeduddi/docmind-frontend:v9
    container_name: docmind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always