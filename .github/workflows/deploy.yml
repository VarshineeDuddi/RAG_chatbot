name: Build and Deploy

on:
  push:
    branches: [dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ──────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4          # v3 → v4

      # ── Step 2: Generate version tag ───────────────────────────
      - name: Generate version tag
        id: version
        run: |
          VERSION="v${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "🏷️ Version: $VERSION"

      # ── Step 3: Login to Docker Hub ────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3       # v2 → v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 4: Build and push backend ─────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v6  # v4 → v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docmind-backend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/docmind-backend:latest

      # ── Step 5: Build and push frontend ────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6  # v4 → v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docmind-frontend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/docmind-frontend:latest

      # ── Step 6: Update docker-compose.yml with exact version ───
      - name: Update docker-compose version
        run: |
          sed -i "s|docmind-backend:.*|docmind-backend:${{ env.VERSION }}|g" docker-compose.yml
          sed -i "s|docmind-frontend:.*|docmind-frontend:${{ env.VERSION }}|g" docker-compose.yml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docker-compose.yml
          git commit -m "chore: bump image version to ${{ env.VERSION }}"
          git push origin dev

      # ── Step 7: Deploy to VM ────────────────────────────────────
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/dm.varshinee/chatbot
            git pull origin dev
            docker compose down
            docker compose pull
            docker compose up -d
            echo "✅ Deployed ${{ env.VERSION }}"